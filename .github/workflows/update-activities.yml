name: Update Activities Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  update-activities:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch activities from GAS
        run: |
          # 通信失敗時にエラーを出す設定 (-f), 詳細ログ出力 (-vは秘匿情報が出るため避けるが、ステータスは出す)
          curl -sSL -w "HTTP Status: %{http_code}\n" "${{ secrets.SPREADSHEET_API_URL }}" -o /tmp/activities.json
          
          echo "Debug: File size: $(stat -c%s /tmp/activities.json) bytes"
          echo "Debug: Content preview: $(cat /tmp/activities.json | head -c 200)"
          
          if [ ! -s /tmp/activities.json ]; then
            echo "Error: Received empty file from GAS"
            exit 1
          fi

      - name: Update site
        run: |
          mv /tmp/activities.json data/activities.json
          python3 scripts/update_activities.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/activities.json activity.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated activity update"
          git push origin main
