name: Update Activities Data

on:
  # 1時間ごとに実行
  schedule:
    - cron: '0 * * * *'
  # 手動実行も可能
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-activities:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Fetch and embed activities
        run: |
          # スプレッドシートからデータを取得
          curl -L "${{ secrets.SPREADSHEET_API_URL }}" -o /tmp/activities.json
          
          # JSONが有効か確認
          if ! jq empty /tmp/activities.json 2>/dev/null; then
            echo "Error: Invalid JSON received"
            exit 1
          fi
          
      - name: Update activity.html using Python script
        run: |
          # 取得した最新のJSONを配置
          mv /tmp/activities.json data/activities.json
          
          # Pythonスクリプトを実行してHTMLを生成
          python3 scripts/update_activities.py
          
          echo "Successfully updated activity.html using python script"
      
      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet activity.html || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add activity.html
          git commit -m "chore: update activities [skip ci]"
          git push

