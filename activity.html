    <style>
        .page-header {
            padding-top: 100px;
            padding-bottom: 4rem;
            background: #f3f3e9;
            text-align: center;
        }

        .activity-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 4rem 5vw;
        }

        .activity-item {
            padding: 2.5rem 0;
            border-bottom: 2px solid #f0f0f0;
        }

        .activity-item.hidden-activity { display: none; }
        .activity-item:last-child { border-bottom: none; padding-bottom: 0; }
        .activity-item:first-child { padding-top: 0; }

        /* --- モバイル版（デフォルト） --- */
        .activity-header-mobile {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .activity-date {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary-color);
        }

        /* 出し分け用クラス */
        .tags-for-pc { display: none !important; }
        .view-more-for-pc { display: none !important; }
        .tags-for-mobile { display: block !important; margin-top: 1.5rem; }
        .view-more-mobile { display: block !important; }

        .activity-content h4 {
            font-size: 1.4rem;
            font-weight: 800;
            margin: 0 0 1rem 0;
            color: var(--base-inverse-color);
            line-height: 1.4;
        }

        .activity-content p {
            font-size: 1.05rem;
            line-height: 1.8;
            margin: 0;
            color: #333;
        }

        .view-more-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
            white-space: nowrap;
        }

        .view-more-link::after { content: '→'; }

        /* --- PC版（700px以上） --- */
        @media screen and (min-width: 700px) {
            .activity-item {
                display: flex;
                align-items: flex-start;
                padding: 4rem 0;
            }

            .activity-left-col {
                flex-basis: 220px;
                flex-shrink: 0;
                margin-bottom: 0;
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                text-align: left;
            }

            .activity-header-mobile {
                display: block;
                margin-bottom: 0;
            }

            .view-more-mobile { display: none !important; }
            .tags-for-mobile { display: none !important; }

            .tags-for-pc {
                display: block !important;
                margin-top: 1.2rem;
            }

            .activity-content {
                flex-grow: 1;
                padding-left: 4rem;
            }

            .view-more-for-pc {
                display: block !important;
                margin-top: 1.5rem;
            }
        }

        /* ボタン */
        .btn-container { text-align: center; margin-top: 3rem; display: none; }
        #loadMoreBtn, #collapseBtn {
            padding: 1rem 3rem; font-size: 1rem; font-weight: 700; border-radius: 50px; cursor: pointer; border: none;
        }
        #loadMoreBtn { background: var(--primary-color); color: #fff; }
        #collapseBtn { background: #888; color: #fff; }

        .hidden-activity { display: none !important; }
    </style>
