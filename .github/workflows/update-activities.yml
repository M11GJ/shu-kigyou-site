name: Update Activities Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  update-activities:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch activities from GAS
        run: |
          curl -L "${{ secrets.SPREADSHEET_API_URL }}" -o /tmp/activities.json
          echo "Debug: Data preview: $(head -c 100 /tmp/activities.json)"

      - name: Update site
        run: |
          mv /tmp/activities.json data/activities.json
          python3 scripts/update_activities.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/activities.json activity.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated activity update"
          git push origin main
